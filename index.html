<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empire Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>EMPIRE ATLAS</h1><p>Interactive Historical Map</p></header>
<div class="wrap">
<div class="side">
<input id="search" placeholder="Search...">
<button onclick="showEmpire('Maurya Empire',22,79,'Ashoka')">🏛 Maurya Empire</button>
<button onclick="showEmpire('Roman Empire',41,12,'Trajan')">🦅 Roman Empire</button>
<button onclick="showEmpire('Mongol Empire',47,102,'Genghis Khan')">🏹 Mongol Empire</button>
<button onclick="showEmpire('Achaemenid Empire',30,53,'Cyrus the Great')">🦁 Achaemenid Empire</button>
<button onclick="showEmpire('Gupta Empire',25,82,'Samudragupta')">☀ Gupta Empire</button>
<button onclick="showEmpire('Ottoman Empire',39,35,'Suleiman')">🌙 Ottoman Empire</button>
<button onclick="showEmpire('Gokturk Khaganate',47,68,'Bumin Qaghan')">🐺 Gokturk Khaganate</button>
</div>
<div class="main">
<div id="map"></div>
<div class="info">
<h2 id="title">Welcome</h2>
<p id="details">Click an empire to move the map.</p>
</div>
</div>
</div>
<footer>Empire Atlas • Created by Yashwardhan Singh</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
